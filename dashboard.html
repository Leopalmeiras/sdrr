<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDR CRM Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content">
        <header class="page-header">
          <h1>Dashboard SDR</h1>
          <p>Resumo executivo de leads, prioridades e próximos agendamentos comerciais.</p>
        </header>

        <section class="kpi-grid" id="kpiGrid"></section>

        <section class="charts-grid">
          <article class="card">
            <h2>Leads por classificação</h2>
            <div id="statusChart" class="bar-chart"></div>
          </article>
          <article class="card">
            <h2>Leads por origem</h2>
            <div id="origemChart" class="bar-chart"></div>
          </article>
          <article class="card full-width">
            <h2>Próximos passos (leads quentes)</h2>
            <div id="vendedorList" class="stats-list"></div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
