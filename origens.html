<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDR CRM Pro | Origens</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="origens">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="content">
        <header class="page-header">
          <h1>Origens de Leads</h1>
          <p>Página administrativa para configurar origens personalizáveis.</p>
        </header>

        <section class="card form-card">
          <form id="origemForm" class="inline-form" novalidate>
            <input type="hidden" id="origemId" />
            <input id="origemNome" type="text" placeholder="Ex: Webinar" required />
            <button type="submit" class="btn-primary">Salvar origem</button>
          </form>
          <ul id="origensList" class="list-clean"></ul>
        </section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
